name: Feature Request
description: Suggest a feature or idea
title: "[FEATURE]: "
labels:
  - "✨ feature"
  - "🚨 needs approval"

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! 🚀

        Please fill out the sections below to help us understand your proposal.

  - type: textarea
    id: problem
    attributes:
      label: Is your proposal related to a problem?
      description: Describe the problem you're trying to solve.
      placeholder: |
        I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: Explain what you would like to happen.
      placeholder: Describe your proposed solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Tell us about other solutions you've tried or researched.
      placeholder: List alternative approaches...

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add screenshots, mockups, links, or related issues.
      placeholder: Any additional information...

  - type: textarea
    id: requirement_document
    attributes:
      label: Requirement / Document
      description: Share specifications, requirements, design docs, or references.
      placeholder: Attach or link supporting documents...

  - type: markdown
    attributes:
      value: |
        ### House Rules

        - If this issue has a `🚨 needs approval` label, **don't start coding yet**.
        - Wait until a core member removes the label and approves the feature.
        - Non-core member submissions automatically receive this label.
        - Feature ideas are reviewed to ensure alignment with the product roadmap.
        - Follow the Contributor Guidelines before starting work.