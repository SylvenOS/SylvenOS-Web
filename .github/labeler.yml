# Frontend changes
🎨 frontend:
  - "src/**"
  - "public/**"

# Documentation
📚 documentation:
  - "**/*.md"
  - "README.md"
  - "docs/**"

# Backend / Configuration
⚙️ backend:
  - "package.json"
  - "package-lock.json"
  - "tsconfig.json"
  - "next.config.*"
  - "server/**"
  - "api/**"
  - "backend/**"

# Security-related files
🔒 security:
  - "SECURITY.md"
  - ".github/workflows/security*"
  - "**/*auth*"
  - "**/*jwt*"

# Testing
🧪 testing:
  - "tests/**"
  - "__tests__/**"
  - "**/*.test.*"
  - "**/*.spec.*"

# Community / Governance files
🚨 needs approval:
  - ".github/**"
  - "CODE_OF_CONDUCT.md"
  - "CONTRIBUTING.md"
  - ".github/PULL_REQUEST_TEMPLATE.md"

# Good first issue examples
good first issue:
  - "examples/**"

# Feature work
✨ feature:
  - "features/**"

# Bug fixes
🐛 bug:
  - "fixes/**"