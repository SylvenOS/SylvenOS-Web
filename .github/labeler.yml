# Frontend changes
🎨 frontend:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**"
          - "public/**"

# Documentation
📚 documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "README.md"
          - "docs/**"

# Backend / Configuration
⚙️ backend:
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "package-lock.json"
          - "tsconfig.json"
          - "next.config.*"
          - "server/**"
          - "api/**"
          - "backend/**"

# Dependencies
📦 dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "package-lock.json"
          - "yarn.lock"
          - "pnpm-lock.yaml"

# Security
🔒 security:
  - changed-files:
      - any-glob-to-any-file:
          - "SECURITY.md"
          - ".github/workflows/security*"
          - "**/*auth*"
          - "**/*jwt*"

# Testing
🧪 testing:
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"
          - "__tests__/**"
          - "**/*.test.*"
          - "**/*.spec.*"

# GitHub Actions / CI
🤖 github-actions:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"

# Sensitive governance files
🚨 needs approval:
  - changed-files:
      - any-glob-to-any-file:
          - "CODE_OF_CONDUCT.md"
          - "CONTRIBUTING.md"
          - ".github/PULL_REQUEST_TEMPLATE.md"

# Examples
📦 examples:
  - changed-files:
      - any-glob-to-any-file:
          - "examples/**"

# Features
✨ feature:
  - changed-files:
      - any-glob-to-any-file:
          - "features/**"

# Bug fixes
🐛 bug:
  - changed-files:
      - any-glob-to-any-file:
          - "fixes/**"