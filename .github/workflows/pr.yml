name: Pull Request Checks

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  trust-check:
    name: Trust Check
    runs-on: ubuntu-latest

    outputs:
      trusted: ${{ steps.trust.outputs.trusted }}

    steps:
      - name: Check Trust
        id: trust
        uses: actions/github-script@v7
        with:
          script: |
            const trusted = [
              "OWNER",
              "MEMBER",
              "COLLABORATOR"
            ];

            const association =
              context.payload.pull_request.author_association;

            core.setOutput(
              "trusted",
              trusted.includes(association)
            );

  lint:
    needs: trust-check
    if: needs.trust-check.outputs.trusted == 'true'
    uses: ./.github/workflows/lint.yml

  type-check:
    needs: trust-check
    if: needs.trust-check.outputs.trusted == 'true'
    uses: ./.github/workflows/type-check.yml

  build:
    needs: trust-check
    if: needs.trust-check.outputs.trusted == 'true'
    uses: ./.github/workflows/build.yml

  security-audit:
    needs: trust-check
    if: needs.trust-check.outputs.trusted == 'true'
    uses: ./.github/workflows/security-audit.yml

  unit-tests:
    needs: trust-check
    if: needs.trust-check.outputs.trusted == 'true'
    uses: ./.github/workflows/unit-tests.yml

  required:
    name: Required Checks
    runs-on: ubuntu-latest
    if: always()

    needs:
      - trust-check
      - lint
      - type-check
      - build
      - security-audit
      - unit-tests

    steps:
      - name: Verify all required checks passed
        run: |
          if [[ "${{ needs.trust-check.outputs.trusted }}" != "true" ]]; then
            echo "Untrusted PR - checks intentionally skipped"
            exit 0
          fi

          [[ "${{ needs.lint.result }}" == "success" ]] || {
            echo "Lint check failed"
            exit 1
          }

          [[ "${{ needs.type-check.result }}" == "success" ]] || {
            echo "Type check failed"
            exit 1
          }

          [[ "${{ needs.build.result }}" == "success" ]] || {
            echo "Build failed"
            exit 1
          }

          [[ "${{ needs.security-audit.result }}" == "success" ]] || {
            echo "Security audit failed"
            exit 1
          }

          [[ "${{ needs.unit-tests.result }}" == "success" ]] || {
            echo "Unit tests failed"
            exit 1
          }

          echo "All required checks passed"