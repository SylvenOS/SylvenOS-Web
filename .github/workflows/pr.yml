name: Pull Request Checks

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  trust-check:
    name: Trust Check
    runs-on: ubuntu-latest

    outputs:
      trusted: ${{ steps.trust.outputs.trusted }}

    steps:
      - name: Check Trust
        id: trust
        uses: actions/github-script@v7
        with:
          script: |
            const trusted = [
              "OWNER",
              "MEMBER",
              "COLLABORATOR"
            ];

            const association =
              context.payload.pull_request.author_association;

            core.setOutput(
              "trusted",
              trusted.includes(association)
            );

  notify-untrusted:
    name: Notify Untrusted Contributor
    needs: trust-check
    if: github.event.action == 'opened' && needs.trust-check.outputs.trusted != 'true'
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "👋 Thank you for contributing to SylvenOS! This PR requires maintainer review before CI checks can be executed."
              });

  lint:
    name: Lint
    needs: trust-check
    if: needs.trust-check.outputs.trusted == 'true'
    uses: ./.github/workflows/lint.yml

  type-check:
    name: Type Check
    needs: trust-check
    if: needs.trust-check.outputs.trusted == 'true'
    uses: ./.github/workflows/type-check.yml

  build:
    name: Build
    needs: trust-check
    if: needs.trust-check.outputs.trusted == 'true'
    uses: ./.github/workflows/build.yml

  security-audit:
    name: Security Audit
    needs: trust-check
    if: needs.trust-check.outputs.trusted == 'true'
    uses: ./.github/workflows/security-audit.yml

  unit-tests:
    name: Unit Tests
    needs: trust-check
    if: needs.trust-check.outputs.trusted == 'true'
    uses: ./.github/workflows/unit-tests.yml

  required:
    name: Required Checks
    runs-on: ubuntu-latest
    if: always()

    needs:
      - trust-check
      - lint
      - type-check
      - build
      - security-audit
      - unit-tests

    steps:
      - name: Verify checks
        run: |
          if [[ "${{ needs.trust-check.outputs.trusted }}" != "true" ]]; then
            echo "Untrusted PR - checks intentionally skipped"
            exit 0
          fi

          for check in \
            "${{ needs.lint.result }}" \
            "${{ needs.type-check.result }}" \
            "${{ needs.build.result }}" \
            "${{ needs.security-audit.result }}" \
            "${{ needs.unit-tests.result }}"
          do
            [[ "$check" == "success" ]] || {
              echo "A required check failed"
              exit 1
            }
          done

          echo "All required checks passed"