name: Welcome First Time Contributors

on:
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest

    if: github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "🎉 Welcome to SylvenOS!",
              "",
              "Thank you for your first contribution.",
              "",
              "### Before requesting review",
              "",
              "✅ Create a dedicated branch for your changes",
              "✅ Follow Conventional Commits",
              "✅ Ensure all checks pass",
              "✅ Keep your PR focused on a single change",
              "",
              "### Branch Example",
              "",
              "```bash",
              "git checkout -b feat/add-navbar",
              "git push origin feat/add-navbar",
              "```",
              "",
              "⚠️ Please do not work directly on the `main` branch.",
              "",
              "We review contributions through Pull Requests to maintain code quality and project stability.",
              "",
              "Happy contributing! 🚀"
            ].join("\n");
                  
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });